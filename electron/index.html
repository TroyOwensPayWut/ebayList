<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ebayList</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    /* Height must match HEADER_PX in main.js — web tabs render below this line. */
    #header {
      height: 124px;
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px 0;
      border-bottom: 1px solid rgba(127, 127, 127, 0.35);
    }
    .row { display: flex; gap: 8px; align-items: center; min-height: 34px; }
    button {
      font: inherit;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
    }
    button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { margin-left: auto; opacity: 0.7; }
    #productLabel {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 60px;
      opacity: 0.5;
    }
    #productLabel.active { opacity: 1; }
    #category {
      font: inherit;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      width: 150px;
      background: transparent;
      color: inherit;
    }
    #tabbar { gap: 4px; min-height: 30px; }
    #tabbar button {
      border: none;
      border-radius: 8px 8px 0 0;
      padding: 5px 14px;
      opacity: 0.65;
    }
    #tabbar button.active {
      opacity: 1;
      background: rgba(127, 127, 127, 0.2);
      font-weight: 600;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      margin: 0;
      padding: 10px 12px;
      background: rgba(127, 127, 127, 0.12);
      font: 12px/1.5 ui-monospace, Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .err { color: #dc2626; }
  </style>
</head>
<body>
  <div id="header">
    <div class="row">
      <button id="authBtn">Log in to Shopify</button>
      <button id="runBtn" class="primary">Start listing run</button>
      <span id="status">Idle</span>
    </div>
    <div class="row">
      <span id="productLabel">Waiting for a product…</span>
      <input id="category" inputmode="numeric" placeholder="eBay category #" disabled />
      <button id="listEbay" class="primary" disabled>List on eBay</button>
      <button id="listMotors" class="primary" disabled>List on Motors</button>
      <button id="skip" disabled>Skip</button>
      <button id="quit" disabled>Quit run</button>
    </div>
    <div class="row" id="tabbar">
      <button data-tab="log" class="active">Log</button>
    </div>
  </div>

  <pre id="log"></pre>

  <script>
    const $ = (id) => document.getElementById(id)
    const log = $("log")
    const tabbar = $("tabbar")
    const category = $("category")
    const promptControls = ["category", "listEbay", "listMotors", "skip", "quit"].map($)

    const appendLog = ({ level, line }) => {
      const span = document.createElement("span")
      if (level === "error") span.className = "err"
      span.textContent = line + "\n"
      log.appendChild(span)
      log.scrollTop = log.scrollHeight
    }

    // --- Tabs ---
    const tabLabels = new Map() // id -> label

    const highlightTab = (id) => {
      for (const btn of tabbar.querySelectorAll("button")) {
        btn.classList.toggle("active", btn.dataset.tab === String(id ?? "log"))
      }
    }

    tabbar.addEventListener("click", (event) => {
      const tab = event.target.dataset?.tab
      if (!tab) return
      ebayList.activateTab(tab === "log" ? null : Number(tab))
    })

    ebayList.onTabCreated(({ id, label }) => {
      tabLabels.set(id, label)
      const btn = document.createElement("button")
      btn.dataset.tab = String(id)
      btn.textContent = label
      tabbar.appendChild(btn)
    })

    ebayList.onTabsCleared(() => {
      tabLabels.clear()
      for (const btn of tabbar.querySelectorAll("button")) {
        if (btn.dataset.tab !== "log") btn.remove()
      }
      highlightTab(null)
    })

    ebayList.onTabActive(highlightTab)

    // --- Prompt ---
    const setPromptActive = (active) => {
      for (const el of promptControls) el.disabled = !active
      $("productLabel").classList.toggle("active", active)
      if (!active) $("productLabel").textContent = "Waiting for a product…"
    }

    ebayList.onPrompt(({ sku, title }) => {
      $("productLabel").textContent = `${sku} — ${title || "(no title)"}`
      category.value = ""
      setPromptActive(true)
      // Show the category lookup while the user decides.
      const googleId = [...tabLabels].find(([, label]) => label === "Google")?.[0]
      if (googleId) ebayList.activateTab(googleId)
      category.focus()
    })

    const respond = (action) => {
      setPromptActive(false)
      ebayList.respond(action)
    }

    const list = (marketplace) => {
      const value = category.value.trim()
      if (!/^\d+$/.test(value) || Number(value) <= 0) {
        appendLog({ level: "error", line: "Enter a positive eBay category number (digits only)." })
        category.focus()
        return
      }
      respond({ action: "list", marketplace, category: value })
    }

    // --- Wiring ---
    ebayList.onLog(appendLog)
    ebayList.onBusy((busy) => {
      $("runBtn").disabled = busy
      $("authBtn").disabled = busy
      $("status").textContent = busy ? "Running…" : "Idle"
      if (!busy) setPromptActive(false)
    })

    $("listEbay").onclick = () => list("ebay")
    $("listMotors").onclick = () => list("motors")
    $("skip").onclick = () => respond({ action: "skip" })
    $("quit").onclick = () => respond({ action: "quit" })
    $("runBtn").onclick = () => ebayList.startRun()
    $("authBtn").onclick = () => ebayList.startAuth()
  </script>
</body>
</html>
