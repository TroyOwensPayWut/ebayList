name: Build & Release (latest)

# Build a fresh macOS DMG on every push to main and publish it as a
# rolling "latest" pre-release. Each run replaces the previous one so
# there is always exactly one downloadable build of the newest main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Only one build at a time; cancel an in-progress build if a newer
# commit lands on main.
concurrency:
  group: build-release-latest
  cancel-in-progress: true

permissions:
  contents: write # needed to create/replace the GitHub Release + tag

jobs:
  build:
    runs-on: macos-latest # a macOS DMG must be built on macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        # tsc + electron-builder --mac. --publish never keeps
        # electron-builder from trying to manage the release itself;
        # we upload the artifact ourselves below.
        run: pnpm exec tsc && pnpm exec electron-builder --mac --publish never

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Remove the previous "latest" release and its tag so the new
          # build fully replaces it (and the tag points at this commit).
          gh release delete latest --yes --cleanup-tag || true

          gh release create latest \
            --prerelease \
            --title "Latest main build" \
            --target "$GITHUB_SHA" \
            --notes "Automated build from commit ${GITHUB_SHA}. This pre-release is replaced on every push to main." \
            release/*.dmg
